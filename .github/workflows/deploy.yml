name: Deploy Blog Post

# Triggered by the admin dashboard via workflow_dispatch API call.
# The BLOG_TOKEN secret is used here server-side — it never touches the browser.
on:
  workflow_dispatch:
    inputs:
      post_filename:
        description: 'Filename of the blog post (e.g. my-post.html)'
        required: true
      post_content:
        description: 'Base64-encoded HTML content of the blog post'
        required: true
      blog_content:
        description: 'Base64-encoded HTML content of blog.html'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOG_TOKEN }}

      - name: Write blog post file
        run: |
          echo "${{ github.event.inputs.post_content }}" | base64 --decode > "public/${{ github.event.inputs.post_filename }}"

      - name: Write blog.html
        run: |
          echo "${{ github.event.inputs.blog_content }}" | base64 --decode > "public/blog.html"

      - name: Commit and push changes
        run: |
          git config user.name  "CineFormat Admin"
          git config user.email "admin@cineformatautomation.online"
          git add "public/${{ github.event.inputs.post_filename }}" "public/blog.html"
          git diff --staged --quiet || git commit -m "Update ${{ github.event.inputs.post_filename }} via CineFormat Admin"
          git push
